<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="820" viewBox="0 0 1300 820" font-family="Arial, sans-serif">
  <style>
    .blk  { fill:#ffffff; stroke:#000; stroke-width:2; }
    .lblc { font-size:17px; fill:#000; text-anchor:middle; }
    .sm   { font-size:13px; fill:#000; text-anchor:middle; }
    .sig  { font-size:14px; fill:#000; }
    .bus  { stroke:#000; stroke-width:1.7; fill:none; marker-end:url(#a); }
    .busn { stroke:#000; stroke-width:1.7; fill:none; }
    .ctl  { stroke:#000; stroke-width:1.3; fill:none; stroke-dasharray:6 4; marker-end:url(#a); }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3.4" orient="auto">
      <path d="M0,0 L9,3.4 L0,6.8 Z" fill="#000"/>
    </marker>
  </defs>

  <text x="20" y="30" font-size="20" font-weight="bold">Control Unit — hardwired (без микрокода)</text>

  <!-- ====== PC + MUX ====== -->
  <!-- MUX перед PC -->
  <polygon class="blk" points="300,80 400,80 380,140 320,140"/>
  <text x="350" y="116" class="lblc">MUX</text>
  <path class="ctl" d="M300,150 L300,140"/>
  <text x="250" y="160" class="sig">sel_pc</text>
  <!-- PC -->
  <rect class="blk" x="440" y="92" width="80" height="40"/>
  <text x="480" y="118" class="lblc">PC</text>
  <path class="ctl" d="M480,160 L480,132"/>
  <text x="440" y="176" class="sig">latch_PC</text>
  <path class="bus" d="M380,110 L440,110"/>

  <!-- +1 обратная связь -->
  <path class="busn" d="M520,110 L560,110 L560,48 L350,48 L350,80"/>
  <text x="430" y="42" class="sig">PC + 1</text>

  <!-- Instruction (из памяти) -->
  <rect class="blk" x="640" y="80" width="200" height="64"/>
  <text x="740" y="108" class="lblc" font-weight="bold">Память</text>
  <text x="740" y="128" class="sm">(neum: код и данные)</text>
  <path class="bus" d="M520,112 L640,112"/>
  <text x="548" y="106" class="sig">PC → addr</text>

  <!-- IR -->
  <rect class="blk" x="900" y="80" width="80" height="40"/>
  <text x="940" y="106" class="lblc">IR</text>
  <path class="ctl" d="M940,150 L940,120"/>
  <text x="900" y="166" class="sig">latch_IR</text>
  <path class="bus" d="M840,108 L900,108"/>
  <text x="848" y="102" class="sig">word</text>

  <!-- opcode -> decoder -->
  <path class="bus" d="M940,120 L940,210 L820,210 L820,250"/>
  <text x="860" y="206" class="sig">opcode</text>

  <!-- ====== HARDWIRED DECODER (вместо микро-ПЗУ) ====== -->
  <rect class="blk" x="640" y="250" width="360" height="120"/>
  <text x="820" y="282" class="lblc" font-weight="bold">Hardwired-дешифратор</text>
  <text x="820" y="306" class="sm">тип = opcode &gt;&gt; 5</text>
  <text x="820" y="328" class="sm">тип + стадия → управляющие сигналы</text>

  <!-- Stage counter (FSM) -->
  <rect class="blk" x="1040" y="250" width="180" height="120"/>
  <text x="1130" y="280" class="lblc" font-weight="bold">Счётчик стадий</text>
  <text x="1130" y="304" class="sm">FETCH → DECODE →</text>
  <text x="1130" y="324" class="sm">EXECUTE → MEMORY →</text>
  <text x="1130" y="344" class="sm">WRITEBACK → CHECK_IRQ</text>
  <path class="busn" d="M1040,310 L1000,310"/>
  <text x="1004" y="304" class="sig">стадия</text>
  <path class="ctl" d="M1130,210 L1130,250"/>
  <text x="1075" y="206" class="sig">tick (такт)</text>

  <!-- signals out -->
  <path class="bus" d="M820,370 L820,440"/>
  <text x="830" y="410" class="sig">сигналы (sel/latch/write/alu_op)</text>

  <!-- DataPath block -->
  <rect class="blk" x="600" y="440" width="440" height="80"/>
  <text x="820" y="475" class="lblc" font-weight="bold">DataPath</text>
  <text x="820" y="498" class="sm">регистры · АЛУ · память · I/O (см. datapath.svg)</text>

  <!-- N,Z back -->
  <path class="bus" d="M600,480 L520,480 L520,300 L640,300"/>
  <text x="500" y="400" class="sig" transform="rotate(-90 500,400)">N, Z (флаги)</text>

  <!-- ====== Interrupt handling (trap) ====== -->
  <rect class="blk" x="120" y="250" width="330" height="180"/>
  <text x="285" y="282" class="lblc" font-weight="bold">Логика прерываний (trap)</text>
  <text x="285" y="308" class="sm">на стадии CHECK_IRQ:</text>
  <text x="285" y="330" class="sm">if IRQ &amp; IE &amp; ¬IN_HANDLER:</text>
  <text x="285" y="350" class="sm">  SAVED_PC ← PC; SAVED_FL ← FLAGS</text>
  <text x="285" y="370" class="sm">  IN_HANDLER ← 1</text>
  <text x="285" y="392" class="sm">  PC ← MEM[0] (адрес обработчика)</text>
  <text x="285" y="414" class="sm">IRET: восстановить PC, FLAGS, IN_HANDLER←0</text>
  <!-- IRQ in -->
  <path class="bus" d="M60,300 L120,300"/>
  <text x="20" y="294" class="sig">IRQ</text>
  <!-- влияет на sel_pc -->
  <path class="bus" d="M285,250 L285,160 L350,160 L350,140" stroke-dasharray="0"/>
  <text x="295" y="200" class="sig">переход в обработчик → sel_pc</text>

  <!-- footer -->
  <text x="20" y="560" class="sig">Hardwired-управление: сигналы вырабатываются комбинационной схемой из типа инструкции и номера стадии (без микрокода).</text>
</svg>
