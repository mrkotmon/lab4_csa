<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="860" viewBox="0 0 1300 860" font-family="Arial, sans-serif">
  <style>
    .blk  { fill:#ffffff; stroke:#000; stroke-width:2; }
    .lblc { font-size:17px; fill:#000; text-anchor:middle; }
    .sm   { font-size:13px; fill:#000; text-anchor:middle; }
    .sig  { font-size:14px; fill:#000; }
    .bus  { stroke:#000; stroke-width:1.7; fill:none; marker-end:url(#a); }
    .busn { stroke:#000; stroke-width:1.7; fill:none; }
    .ctl  { stroke:#000; stroke-width:1.3; fill:none; stroke-dasharray:6 4; marker-end:url(#a); }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3.4" orient="auto">
      <path d="M0,0 L9,3.4 L0,6.8 Z" fill="#000"/>
    </marker>
  </defs>

  <text x="20" y="30" font-size="20" font-weight="bold">DataPath — RISC, фон-Нейман, векторное расширение</text>

  <!-- Control Unit (сверху, источник управляющих сигналов) -->
  <rect class="blk" x="540" y="60" width="220" height="64"/>
  <text x="650" y="92" class="lblc" font-weight="bold">Control Unit</text>
  <text x="650" y="112" class="sm">(см. control_unit.svg)</text>
  <path class="busn" d="M650,124 L650,150"/>
  <path class="ctl" d="M650,150 L650,168"/>
  <text x="660" y="146" class="sig">управляющие сигналы</text>
  <!-- N,Z в CU -->
  <path class="bus" d="M585,680 L520,680 L520,108 L540,108"/>
  <text x="525" y="400" class="sig" transform="rotate(-90 525,400)">N, Z → Control Unit</text>

  <!-- ============ Register File (слева) ============ -->
  <rect class="blk" x="120" y="320" width="250" height="180"/>
  <text x="245" y="352" class="lblc" font-weight="bold">Регистровый файл</text>
  <text x="245" y="376" class="sm">R0 = 0 (hardwired)</text>
  <text x="245" y="396" class="sm">R1 … R7 — скалярные</text>
  <text x="245" y="416" class="sm">V0 … V3 — векторные (4×4×32)</text>
  <text x="245" y="442" class="sm">2 порта чтения (rs1, rs2)</text>
  <text x="245" y="462" class="sm">1 порт записи (rd)</text>
  <!-- control сигналы слева -->
  <path class="ctl" d="M120,348 L60,348"/><text x="14" y="344" class="sig">sel_rs1</text>
  <path class="ctl" d="M120,376 L60,376"/><text x="14" y="372" class="sig">sel_rs2</text>
  <path class="ctl" d="M120,460 L60,460"/><text x="14" y="456" class="sig">write_reg</text>

  <!-- rs1, rs2 → ALU -->
  <path class="bus" d="M370,376 L430,376 L430,560 L500,560"/>
  <text x="378" y="370" class="sig">rs1</text>
  <path class="bus" d="M370,404 L410,404 L410,600 L500,600"/>
  <text x="378" y="420" class="sig">rs2</text>

  <!-- imm из IR (из Control Unit области) -->
  <path class="bus" d="M760,150 L470,150 L470,530 L500,530"/>
  <text x="490" y="166" class="sig">imm (из IR)</text>

  <!-- ============ ALU (центр) ============ -->
  <polygon class="blk" points="500,510 640,510 605,650 535,650"/>
  <text x="570" y="558" class="lblc" font-weight="bold">АЛУ</text>
  <text x="570" y="580" class="sm">скаляр + вектор</text>
  <text x="570" y="598" class="sm">(4 элем./такт)</text>
  <path class="ctl" d="M430,560 L500,560"/><text x="392" y="556" class="sig">alu_op</text>

  <!-- FLAGS -->
  <rect class="blk" x="525" y="666" width="90" height="32"/>
  <text x="570" y="688" class="lblc" font-size="14">FLAGS</text>
  <path class="bus" d="M570,650 L570,666"/>
  <text x="580" y="662" class="sig">Z, N</text>

  <!-- ALU result → шина -->
  <path class="busn" d="M605,580 L690,580"/>
  <circle cx="690" cy="580" r="3" fill="#000"/>
  <text x="640" y="600" class="sig">alu_result</text>
  <!-- result → writeback -->
  <path class="bus" d="M690,580 L690,740 L245,740 L245,500"/>
  <text x="380" y="734" class="sig">result → rd (writeback)</text>
  <!-- result → eff_addr (для адреса памяти) -->
  <path class="bus" d="M690,580 L690,400 L860,400 L860,360 L900,360"/>
  <text x="700" y="394" class="sig">eff_addr = rs1 + imm</text>

  <!-- ============ Memory (справа) ============ -->
  <rect class="blk" x="900" y="300" width="250" height="190"/>
  <text x="1025" y="332" class="lblc" font-weight="bold">Память</text>
  <text x="1025" y="356" class="sm">2048 × 32 бит</text>
  <text x="1025" y="376" class="sm">код + данные (neum)</text>
  <text x="1025" y="396" class="sm">однопортовая</text>
  <text x="1025" y="420" class="sm">addr 0 — вектор прерывания</text>
  <text x="1025" y="442" class="sm">2046 INPUT · 2047 OUTPUT</text>
  <path class="ctl" d="M1150,332 L1210,332"/><text x="1160" y="328" class="sig">write_mem</text>

  <!-- PC → addr (fetch) -->
  <path class="bus" d="M650,168 L650,250 L820,250 L820,300"/>
  <text x="660" y="244" class="sig">PC → addr (fetch)</text>

  <!-- data_out (load) → writeback bus -->
  <path class="bus" d="M900,430 L760,430 L760,470 L245,470 L245,500" stroke-dasharray="0"/>
  <text x="430" y="464" class="sig">data_out (LW / VLD) → rd</text>

  <!-- data_in (store) -->
  <path class="bus" d="M370,432 L880,432 L880,470 L900,470"/>
  <text x="560" y="426" class="sig">data_in (SW / VST: rd_data)</text>

  <!-- ============ I/O / trap (справа снизу) ============ -->
  <rect class="blk" x="900" y="560" width="250" height="120"/>
  <text x="1025" y="592" class="lblc" font-weight="bold">Внешний мир (trap)</text>
  <text x="1025" y="616" class="sm">расписание [(tick, char), …]</text>
  <text x="1025" y="638" class="sm">→ INPUT 2046  +  IRQ</text>
  <text x="1025" y="660" class="sm">OUTPUT 2047 → stdout</text>
  <path class="bus" d="M1025,560 L1025,490"/>
  <text x="1033" y="528" class="sig">mmio</text>

  <!-- footer -->
  <text x="20" y="790" class="sig">Шины — 32 бита. Управляющие сигналы (пунктир) формирует Control Unit.</text>
</svg>
